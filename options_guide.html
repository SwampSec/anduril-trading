<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Options Strategy Guide</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#070A18;--panel:#0C1020;--card:#111628;--border:#1C2540;
  --accent:#38BDF8;--profit:#34D399;--loss:#F87171;--warn:#FBBF24;--purple:#A78BFA;
  --text:#C8D6EE;--muted:#3E5272;--hi:#161E36;--line:#1A2845;
}
html,body{height:100%;overflow:hidden}
body{font-family:'Inter',sans-serif;font-size:13px;background:var(--bg);color:var(--text);display:flex;flex-direction:column}

/* HEADER */
.hdr{height:52px;background:var(--panel);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:16px;flex-shrink:0;position:relative;z-index:10}
.hdr-logo{font-family:'IBM Plex Mono',monospace;font-size:15px;font-weight:700;color:var(--accent);letter-spacing:.06em;display:flex;align-items:center;gap:8px}
.hdr-logo::before{content:'⊗';font-size:18px}
.hdr-sub{color:var(--muted);font-size:11px;border-left:1px solid var(--border);padding-left:16px;margin-left:4px}
.hdr-actions{margin-left:auto;display:flex;align-items:center;gap:12px}
.hdr-count{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted)}
.back-app-btn{font-family:'IBM Plex Mono',monospace;font-size:11px;padding:7px 12px;background:rgba(56,189,248,.1);border:1px solid rgba(56,189,248,.25);border-radius:6px;color:var(--accent);text-decoration:none;white-space:nowrap;letter-spacing:.04em;transition:border-color .12s,color .12s}
.back-app-btn:hover{color:#E2EEFF;border-color:var(--accent)}

/* LAYOUT */
.layout{display:flex;flex:1;overflow:hidden}

/* SIDEBAR */
.sidebar{width:248px;background:var(--panel);border-right:1px solid var(--border);overflow-y:auto;flex-shrink:0}
.sidebar::-webkit-scrollbar{width:3px}
.sidebar::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.cat-label{padding:14px 16px 5px;font-size:9.5px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}
.strat-btn{display:flex;align-items:center;gap:9px;padding:7px 16px;width:100%;border:none;background:none;text-align:left;color:var(--text);font-family:'Inter',sans-serif;font-size:12px;cursor:pointer;transition:background .12s,color .12s;line-height:1.3}
.strat-btn:hover:not(.active){background:rgba(56,189,248,.08)}
.strat-btn.active{background:var(--hi);color:var(--accent);border-right:2px solid var(--accent)}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:1px}
.dot-bull{background:var(--profit)}
.dot-bear{background:var(--loss)}
.dot-neut{background:var(--warn)}
.dot-vol{background:var(--accent)}
.dot-arb{background:var(--purple)}
.dot-time{background:#C084FC}

/* CONTENT */
.content{flex:1;overflow-y:auto;padding:24px}
.content::-webkit-scrollbar{width:5px}
.content::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* WELCOME */
.welcome{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;opacity:.4}
.welcome-glyph{font-size:56px;filter:grayscale(1)}
.welcome-title{font-family:'IBM Plex Mono',monospace;font-size:16px;color:var(--muted)}
.welcome-sub{font-size:12px;color:var(--muted)}

/* STRATEGY HEADER */
.strat-hdr{margin-bottom:18px}
.strat-name{font-family:'IBM Plex Mono',monospace;font-size:20px;font-weight:700;color:#E2EEFF;line-height:1.25;margin-bottom:8px}
.badges{display:flex;gap:6px;flex-wrap:wrap}
.badge{padding:2px 9px;border-radius:20px;font-size:10.5px;font-weight:600;letter-spacing:.03em;border:1px solid transparent}
.b-bull{background:rgba(52,211,153,.1);color:var(--profit);border-color:rgba(52,211,153,.25)}
.b-bear{background:rgba(248,113,113,.1);color:var(--loss);border-color:rgba(248,113,113,.25)}
.b-neut{background:rgba(251,191,36,.1);color:var(--warn);border-color:rgba(251,191,36,.25)}
.b-vol{background:rgba(56,189,248,.1);color:var(--accent);border-color:rgba(56,189,248,.25)}
.b-arb{background:rgba(167,139,250,.1);color:var(--purple);border-color:rgba(167,139,250,.25)}
.b-def{background:rgba(52,211,153,.08);color:#6EE7B7;border-color:rgba(52,211,153,.2)}
.b-undef{background:rgba(248,113,113,.08);color:#FCA5A5;border-color:rgba(248,113,113,.2)}
.b-lv{background:rgba(56,189,248,.08);color:#7DD3FC;border-color:rgba(56,189,248,.2)}
.b-sv{background:rgba(251,191,36,.08);color:#FDE68A;border-color:rgba(251,191,36,.2)}

/* CHART */
.chart-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:14px}
.chart-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.chart-title{font-size:9.5px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}
.legend{display:flex;gap:12px}
.leg-item{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--muted)}
.leg-line{width:18px;height:2px;border-radius:1px}
.chart-note{font-size:10px;color:var(--muted);font-style:italic;margin-top:6px}

/* STATS */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
.stat{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px 13px}
.stat-lbl{font-size:9.5px;font-weight:600;letter-spacing:.09em;text-transform:uppercase;color:var(--muted);margin-bottom:3px}
.stat-val{font-family:'IBM Plex Mono',monospace;font-size:14px;font-weight:600}
.sv-profit{color:var(--profit)}
.sv-loss{color:var(--loss)}
.sv-neut{color:var(--warn)}
.sv-accent{color:var(--accent)}
.sv-purple{color:var(--purple)}

/* TWO-COL GRID */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
.card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:14px}
.card-title{font-size:9.5px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
.card-body{font-size:12.5px;line-height:1.65;color:var(--text)}

/* LEGS TABLE */
.legs-wrap{background:var(--card);border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:14px}
.legs-title{font-size:9.5px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);padding:10px 14px 6px}
table{width:100%;border-collapse:collapse}
th{background:#0A0E1C;padding:6px 14px;text-align:left;font-size:9.5px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);border-bottom:1px solid var(--border)}
td{padding:7px 14px;font-family:'IBM Plex Mono',monospace;font-size:12px;border-bottom:1px solid rgba(28,37,64,.5);color:var(--text)}
tr:last-child td{border-bottom:none}
.long{color:var(--profit)}
.short{color:var(--loss)}

/* GREEKS */
.greeks-row{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.greek{padding:4px 11px;border-radius:6px;font-size:11px;font-family:'IBM Plex Mono',monospace;font-weight:600}
.gp{background:rgba(52,211,153,.12);color:var(--profit)}
.gn{background:rgba(248,113,113,.12);color:var(--loss)}
.gz{background:rgba(62,82,114,.2);color:var(--muted)}

/* SVG */
svg text{font-family:'IBM Plex Mono',monospace}
</style>
</head>

const CATS = ['Long Options','Short Options','Stock + Option','Spreads',
  'Straddles & Strangles','Condors','Butterflies','Collars & Synthetics','Arbitrage','Time Spreads'];

function buildSidebar(){
  const sb=document.getElementById('sidebar');
  document.getElementById('stratCount').textContent=STRATEGIES.length+' strategies';
  CATS.forEach(cat=>{
    const strats=STRATEGIES.filter(s=>s.cat===cat);
    if(!strats.length)return;
    const lbl=document.createElement('div');
    lbl.className='cat-label';
    lbl.textContent=cat;
    sb.appendChild(lbl);
    strats.forEach(s=>{
      const btn=document.createElement('button');
      btn.className='strat-btn';
      btn.dataset.id=s.id;
      btn.innerHTML=`<span class="dot dot-${s.dot}"></span>${s.name}`;
      btn.onclick=()=>selectStrategy(s.id,btn);
      sb.appendChild(btn);
    });
  });
}

// ─── CHART RENDERER ───────────────────────────────────────────────────────────
function buildChart(s){
  const [minS,maxS]=s.range;
  const N=300;
  const W=600,H=210;
  const pad={t:22,r:16,b:38,l:58};
  const cW=W-pad.l-pad.r, cH=H-pad.t-pad.b;

  const prices=Array.from({length:N},(_,i)=>minS+(i/(N-1))*(maxS-minS));
  const pnls=prices.map(s.payoff);

  if(s.flat){
    // For arbitrage flat lines, show a simple flat chart
    const flatVal=pnls[0];
    const yMin=-3, yMax=3;
    const xS=p=>pad.l+((p-minS)/(maxS-minS))*cW;
    const yP=v=>pad.t+cH-((v-yMin)/(yMax-yMin))*cH;
    const zY=yP(0);
    const lineY=yP(flatVal);
    const svg=`<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:auto">
      <rect x="${pad.l}" y="${pad.t}" width="${cW}" height="${cH}" fill="#0A0E1C" rx="4"/>
      ${[0].map(v=>`<line x1="${pad.l}" y1="${yP(v)}" x2="${pad.l+cW}" y2="${yP(v)}" stroke="#2A3A5A" stroke-width="1.5"/>`).join('')}
      <rect x="${pad.l}" y="${Math.min(lineY,zY)}" width="${cW}" height="${Math.abs(lineY-zY)||1}" fill="${flatVal>=0?'rgba(52,211,153,.08)':'rgba(248,113,113,.08)'}"/>
      <line x1="${pad.l}" y1="${lineY}" x2="${pad.l+cW}" y2="${lineY}" stroke="${flatVal>=0?'#34D399':'#F87171'}" stroke-width="2.5" stroke-dasharray="6,3"/>
      <line x1="${pad.l}" y1="${zY}" x2="${pad.l+cW}" y2="${zY}" stroke="#3E5272" stroke-width="1" stroke-dasharray="4,4"/>
      <line x1="${pad.l}" y1="${pad.t}" x2="${pad.l}" y2="${pad.t+cH}" stroke="#1C2540" stroke-width="1"/>
      <line x1="${pad.l}" y1="${pad.t+cH}" x2="${pad.l+cW}" y2="${pad.t+cH}" stroke="#1C2540" stroke-width="1"/>
      <text x="${pad.l-6}" y="${lineY+4}" text-anchor="end" fill="#34D399" font-size="10">$${flatVal.toFixed(2)}</text>
      <text x="${pad.l-6}" y="${zY+4}" text-anchor="end" fill="#3E5272" font-size="10">$0</text>
      <text x="${pad.l+cW/2}" y="${H-4}" text-anchor="middle" fill="#3E5272" font-size="10">Stock Price</text>
      <text x="${pad.l}" y="${H-4}" text-anchor="start" fill="#3E5272" font-size="9">$${minS}</text>
      <text x="${pad.l+cW}" y="${H-4}" text-anchor="end" fill="#3E5272" font-size="9">$${maxS}</text>
      <text x="${pad.l+cW/2}" y="${lineY-8}" text-anchor="middle" fill="${flatVal>=0?'#34D399':'#F87171'}" font-size="10" font-weight="600">Flat P&amp;L — Riskless Arbitrage</text>
    </svg>`;
    return svg;
  }

  const rawMin=Math.min(...pnls), rawMax=Math.max(...pnls);
  const pRange=rawMax-rawMin||10;
  const yMin=rawMin-pRange*0.18, yMax=rawMax+pRange*0.18;

  const xS=p=>pad.l+((p-minS)/(maxS-minS))*cW;
  const yP=v=>pad.t+cH-((v-yMin)/(yMax-yMin))*cH;
  const zY=yP(0);

  // Grid lines - y axis
  const step=pRange>30?10:pRange>15?5:pRange>6?2:1;
  const startV=Math.ceil(yMin/step)*step;
  const gridVals=[];
  for(let v=startV;v<=yMax;v+=step) gridVals.push(v);

  // X grid
  const xStep=(maxS-minS)/6;
  const xGridVals=[];
  for(let x=minS;x<=maxS+0.1;x+=xStep) xGridVals.push(Math.round(x));

  // Build polyline points
  const pts=prices.map((p,i)=>`${xS(p).toFixed(1)},${yP(pnls[i]).toFixed(1)}`);

  // Profit and loss area polygons (closed to zero line)
  const closedPath=`M ${xS(prices[0])},${Math.max(pad.t,Math.min(pad.t+cH,zY))} `+
    prices.map((p,i)=>`L ${xS(p)},${Math.max(pad.t,Math.min(pad.t+cH,yP(pnls[i])))}`).join(' ')+
    ` L ${xS(prices[N-1])},${Math.max(pad.t,Math.min(pad.t+cH,zY))} Z`;

  // Find zero crossings for markers
  const zeroCrossings=[];
  for(let i=0;i<N-1;i++){
    if((pnls[i]<0&&pnls[i+1]>=0)||(pnls[i]>=0&&pnls[i+1]<0)){
      const t=-pnls[i]/(pnls[i+1]-pnls[i]);
      const crossS=prices[i]+t*(prices[i+1]-prices[i]);
      zeroCrossings.push(crossS);
    }
  }

  // Max profit / max loss points
  const maxPnl=Math.max(...pnls), minPnl=Math.min(...pnls);
  const maxIdx=pnls.indexOf(maxPnl), minIdx=pnls.indexOf(minPnl);
  const maxStar=prices[maxIdx], minStar=prices[minIdx];

  // S0 marker at $100
  const S0=100;
  const S0x=xS(S0), S0y=yP(s.payoff(S0));

  const svg=`<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:auto">
  <defs>
    <clipPath id="cp-profit-${s.id}">
      <rect x="${pad.l}" y="${pad.t}" width="${cW}" height="${Math.max(0,zY-pad.t)}"/>
    </clipPath>
    <clipPath id="cp-loss-${s.id}">
      <rect x="${pad.l}" y="${zY}" width="${cW}" height="${Math.max(0,pad.t+cH-zY)}"/>
    </clipPath>
    <clipPath id="cp-chart-${s.id}">
      <rect x="${pad.l}" y="${pad.t}" width="${cW}" height="${cH}"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect x="${pad.l}" y="${pad.t}" width="${cW}" height="${cH}" fill="#090D1C" rx="4"/>

  <!-- Y grid -->
  ${gridVals.map(v=>`
    <line x1="${pad.l}" y1="${yP(v).toFixed(1)}" x2="${pad.l+cW}" y2="${yP(v).toFixed(1)}" stroke="#141E34" stroke-width="1"/>
    <text x="${pad.l-6}" y="${(yP(v)+3.5).toFixed(1)}" text-anchor="end" fill="#2E4060" font-size="9">${v>0?'+':''}${v}</text>
  `).join('')}

  <!-- X grid -->
  ${xGridVals.map(x=>`
    <line x1="${xS(x).toFixed(1)}" y1="${pad.t}" x2="${xS(x).toFixed(1)}" y2="${pad.t+cH}" stroke="#141E34" stroke-width="1"/>
    <text x="${xS(x).toFixed(1)}" y="${pad.t+cH+14}" text-anchor="middle" fill="#2E4060" font-size="9">$${x}</text>
  `).join('')}

  <!-- Profit fill -->
  <path d="${closedPath}" fill="rgba(52,211,153,0.1)" clip-path="url(#cp-profit-${s.id})"/>
  <!-- Loss fill -->
  <path d="${closedPath}" fill="rgba(248,113,113,0.1)" clip-path="url(#cp-loss-${s.id})"/>

  <!-- Zero line -->
  <line x1="${pad.l}" y1="${zY.toFixed(1)}" x2="${pad.l+cW}" y2="${zY.toFixed(1)}" stroke="#2A3850" stroke-width="1.5" stroke-dasharray="4,4"/>

  <!-- Payoff curve -->
  <polyline points="${pts.join(' ')}" fill="none" stroke="#38BDF8" stroke-width="2.5"
    stroke-linejoin="round" stroke-linecap="round" clip-path="url(#cp-chart-${s.id})"/>

  <!-- Profit portion of curve (green) -->
  <polyline points="${pts.join(' ')}" fill="none" stroke="#34D399" stroke-width="2.5"
    stroke-linejoin="round" stroke-linecap="round" clip-path="url(#cp-profit-${s.id})"/>

  <!-- Loss portion of curve (red) -->
  <polyline points="${pts.join(' ')}" fill="none" stroke="#F87171" stroke-width="2.5"
    stroke-linejoin="round" stroke-linecap="round" clip-path="url(#cp-loss-${s.id})"/>

  <!-- Axes -->
  <line x1="${pad.l}" y1="${pad.t}" x2="${pad.l}" y2="${pad.t+cH}" stroke="#1C2540" stroke-width="1.5"/>
  <line x1="${pad.l}" y1="${pad.t+cH}" x2="${pad.l+cW}" y2="${pad.t+cH}" stroke="#1C2540" stroke-width="1.5"/>

  <!-- Zero crossings (breakeven dots) -->
  ${zeroCrossings.map(sx=>`
    <line x1="${xS(sx).toFixed(1)}" y1="${pad.t}" x2="${xS(sx).toFixed(1)}" y2="${pad.t+cH}" stroke="rgba(251,191,36,0.3)" stroke-width="1" stroke-dasharray="3,3"/>
    <circle cx="${xS(sx).toFixed(1)}" cy="${zY.toFixed(1)}" r="4" fill="#FBBF24" stroke="#090D1C" stroke-width="1.5"/>
    <text x="${xS(sx).toFixed(1)}" y="${zY+18}" text-anchor="middle" fill="#FBBF24" font-size="9.5" font-weight="600">$${sx.toFixed(1)}</text>
  `).join('')}

  <!-- Max profit star -->
  ${Math.abs(maxPnl)<999?`
    <circle cx="${xS(maxStar).toFixed(1)}" cy="${yP(maxPnl).toFixed(1)}" r="4" fill="#34D399" stroke="#090D1C" stroke-width="1.5"/>
  `:''}

  <!-- S0 vertical line -->
  <line x1="${S0x.toFixed(1)}" y1="${pad.t}" x2="${S0x.toFixed(1)}" y2="${pad.t+cH}" stroke="rgba(56,189,248,0.3)" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="${S0x.toFixed(1)}" y="${pad.t-6}" text-anchor="middle" fill="#38BDF8" font-size="9">S₀=$100</text>

  <!-- Axis labels -->
  <text x="${pad.l+cW/2}" y="${H-2}" text-anchor="middle" fill="#3E5272" font-size="9.5">Stock Price at Expiration ($)</text>
  <text x="10" y="${pad.t+cH/2}" text-anchor="middle" fill="#3E5272" font-size="9.5" transform="rotate(-90 10 ${pad.t+cH/2})">P&amp;L ($)</text>
</svg>`;
  return svg;
}

// ─── RENDER STRATEGY ──────────────────────────────────────────────────────────
function outlookBadge(s){
  const cls=s.dot==='bull'?'b-bull':s.dot==='bear'?'b-bear':s.dot==='vol'?'b-vol':s.dot==='arb'?'b-arb':s.dot==='time'?'b-vol':'b-neut';
  return `<span class="badge ${cls}">${s.outlook}</span>`;
}
function riskBadge(s){
  return `<span class="badge ${s.risk.includes('Unlimited')?'b-undef':'b-def'}">${s.risk}</span>`;
}
function vegaBadge(s){
  const cls=s.vega.includes('Long')?'b-lv':s.vega.includes('Short')?'b-sv':'b-neut';
  return `<span class="badge ${cls}">${s.vega}</span>`;
}
function thetaBadge(s){
  const cls=s.theta.includes('Long')?'b-def':s.theta.includes('Short')?'b-undef':'b-neut';
  return `<span class="badge ${cls}">${s.theta}</span>`;
}
function greekColor(v){
  if(v==='+'||v==='+1.0')return 'gp';
  if(v==='-'||v==='-1.0')return 'gn';
  return 'gz';
}

function renderStrategy(s){
  const maxValClass=s.stats.maxP==='Unlimited'?'sv-profit':parseFloat(s.stats.maxP)>0?'sv-profit':'sv-loss';
  const minValClass=s.stats.maxL.includes('Unlimited')?'sv-loss':parseFloat(s.stats.maxL)<0?'sv-loss':'sv-profit';

  return `
<div class="strat-hdr">
  <div class="strat-name">${s.name}</div>
  <div class="badges">
    ${outlookBadge(s)} ${riskBadge(s)} ${vegaBadge(s)} ${thetaBadge(s)}
  </div>
</div>

<div class="chart-card">
  <div class="chart-hdr">
    <div class="chart-title">Payoff Diagram — P&amp;L at Expiration (Per Share, Assume 100 Shares)</div>
    <div class="legend">
      <div class="leg-item"><div class="leg-line" style="background:#34D399"></div>Profit</div>
      <div class="leg-item"><div class="leg-line" style="background:#F87171"></div>Loss</div>
      <div class="leg-item"><span style="color:#FBBF24;font-size:10px">●</span>&nbsp;Breakeven</div>
    </div>
  </div>
  ${buildChart(s)}
  ${s.timeNote?`<div class="chart-note">⚠ ${s.timeNote}</div>`:''}
</div>

<div class="stats-row">
  <div class="stat"><div class="stat-lbl">Max Profit</div><div class="stat-val ${maxValClass}">${s.stats.maxP}</div></div>
  <div class="stat"><div class="stat-lbl">Max Loss</div><div class="stat-val ${minValClass}">${s.stats.maxL}</div></div>
  <div class="stat"><div class="stat-lbl">Breakeven</div><div class="stat-val sv-neut">${s.stats.be}</div></div>
  <div class="stat"><div class="stat-lbl">Direction</div><div class="stat-val sv-accent">${s.stats.dir}</div></div>
</div>

<div class="grid2">
  <div class="card"><div class="card-title">Strategy Description</div><div class="card-body">${s.desc}</div></div>
  <div class="card"><div class="card-title">When to Use</div><div class="card-body">${s.use}</div></div>
</div>

<div class="legs-wrap">
  <div class="legs-title">Option Legs — Illustrative Prices (S₀ = $100, 30 DTE, Assumed Inputs)</div>
  <table>
    <tr><th>Position</th><th>Type</th><th>Strike</th><th>Expiry</th><th>Premium</th><th>Notes</th></tr>
    ${s.legs.map(l=>`
    <tr>
      <td class="${l.pos==='Long'?'long':'short'}">${l.pos==='Long'?'▲ Long':'▼ Short'}</td>
      <td>${l.type}</td>
      <td>${l.strike}</td>
      <td>${l.exp}</td>
      <td>${l.prem}</td>
      <td style="font-family:Inter;font-size:11px;color:#4A6080">${l.note}</td>
    </tr>`).join('')}
  </table>
</div>

<div class="card-title" style="margin-bottom:8px">Greek Exposure</div>
<div class="greeks-row">
  ${Object.entries(s.greeks).map(([k,v])=>`<span class="greek ${greekColor(v)}">${k} ${v}</span>`).join('')}
</div>
`;
}

// ─── SELECT STRATEGY ──────────────────────────────────────────────────────────
let activeBtn=null;
function selectStrategy(id, btn){
  const s=STRATEGIES.find(x=>x.id===id);
  if(!s)return;
  if(activeBtn){activeBtn.classList.remove('active');}
  btn.classList.add('active');
  activeBtn=btn;
  const content=document.getElementById('content');
  content.innerHTML=renderStrategy(s);
  content.scrollTop=0;
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
buildSidebar();
</script>
</body>
